<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>aula imagens</title>
    <link rel="shortcut icon" href="favicon-32x32.png" type="image/x-icon">
</head>
<body>
    <h1>Desafio das imagens</h1>
    <h2>Belo Horizonte</h2>
    <img src="bh.jpeg" alt="Belo Horizonte a tarde iluminada" width="800px">
    
    <h2>Imagem de Belo Horizonte com legenda</h2>
    <figure>
        <img src="bh2.webp" alt="arte urbana bh" width="800px">
        <figcaption>imagem de Belo Horizonte com legenda</figcaption>
    </figure>
    <picture>
       <source srcset="bh3othersize.webp" media="(min-widht: 760px)">
       <img src="bh3othersize2.webp" alt="imagem de Belo Horizonte" width="400px">
    </picture>

</body>
</html>
